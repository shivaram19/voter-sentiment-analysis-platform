services:
  postgres:
    image: postgres:14-alpine
    container_name: vsp-postgres
    environment:
      POSTGRES_USER: voter
      POSTGRES_PASSWORD: voter
      POSTGRES_DB: voter_sentiment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voter -d voter_sentiment"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vsp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vsp-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: voter
      DB_PASSWORD: voter
      DB_NAME: voter_sentiment
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_PRIVATE_KEY_PATH: classpath:/privateKey.pem
      JWT_PUBLIC_KEY_PATH: classpath:/publicKey.pem
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: vsp-admin
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8080/api
    ports:
      - "3000:80"

volumes:
  postgres-data:
  redis-data:
