name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: voter
          POSTGRES_PASSWORD: voter
          POSTGRES_DB: voter_sentiment
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: voter
          DB_PASSWORD: voter
          DB_NAME: voter_sentiment
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_PRIVATE_KEY_PATH: classpath:/privateKey.pem
          JWT_PUBLIC_KEY_PATH: classpath:/publicKey.pem
        run: mvn -B test
