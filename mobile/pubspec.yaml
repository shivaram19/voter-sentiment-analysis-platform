name: voter_sentiment_mobile
description: Offline-first voter sentiment collection app for field surveyors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking & auth
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.0.0

  # Offline database (Drift + native SQLite with WAL)
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Background sync
  workmanager: ^0.5.2

  # Location
  geolocator: ^10.1.0
  uuid: ^4.3.3
  uuid: ^4.3.3

  # Navigation & state
  go_router: ^13.0.1
  flutter_riverpod: ^2.4.9
  get_it: ^7.6.4

  # Logging
  logger: ^2.0.2

  # JSON serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  json_serializable: ^6.7.1
  freezed: ^2.4.6

flutter:
  uses-material-design: true
