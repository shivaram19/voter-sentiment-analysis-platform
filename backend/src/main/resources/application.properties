quarkus.application.name=voter-sentiment-backend
quarkus.http.port=8080
quarkus.http.root-path=/api

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:voter}
quarkus.datasource.password=${DB_PASSWORD:voter}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:voter_sentiment}
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# JWT
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH:classpath:/publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_PATH:classpath:/privateKey.pem}
smallrye.jwt.sign.key-format=PEM
mp.jwt.verify.issuer=voter-sentiment
smallrye.jwt.new-token.issuer=voter-sentiment
smallrye.jwt.new-token.lifespan=3600
smallrye.jwt.new-token.refresh-lifespan=86400

# Redis
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.votersentiment".level=DEBUG

# File upload limits
quarkus.http.limits.max-body-size=50M
